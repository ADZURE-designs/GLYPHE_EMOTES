name: Add Approved Emote

on:
  issues:
    types: [labeled]

jobs:
  add-emote:
    if: ${{ github.event.label.name == 'approved' && github.event.sender.login == 'ADZURE-designs' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Parse and validate issue
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const issueNumber = context.issue.number;

            // Parse form fields — find header line then take next non-blank line
            function parseField(fieldName) {
              const lines = body.split(/\r?\n/);
              let found = false;
              for (const line of lines) {
                if (line.trim() === `### ${fieldName}`) { found = true; continue; }
                if (found && line.trim() === '') continue;
                if (found) return line.trim();
              }
              return null;
            }

            let emoteName = parseField('Emote Name');
            const imageUrl = parseField('Image URL');

            if (!emoteName || !imageUrl) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '❌ Could not parse emote name or image URL. Please use the submission form template.'
              });
              core.setFailed('Parse error');
              return;
            }

            // Normalise emote name — single leading colon only, lowercase, no spaces
            emoteName = emoteName.toLowerCase().replace(/\s+/g, '_').replace(/:/g, '');
            emoteName = ':' + emoteName;

            // Validate name format: :letters_numbers_underscores
            if (!/^:[a-z0-9_]+$/.test(emoteName)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `❌ Invalid emote name \`${emoteName}\`. Only letters, numbers, and underscores allowed.`
              });
              core.setFailed('Invalid name');
              return;
            }

            // Validate image URL — allowed hosts + must be a direct image path
            const ALLOWED_HOSTS = ['i.imgur.com', 'i.ibb.co', 'raw.githubusercontent.com'];
            let urlValid = false;
            try {
              const u = new URL(imageUrl);
              urlValid = ALLOWED_HOSTS.includes(u.hostname) &&
                         /\.(png|gif|webp|jpg|jpeg)(\?.*)?$/i.test(u.pathname);
            } catch(e) {}

            if (!urlValid) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `❌ Invalid image URL. Must be a direct image link (.png / .gif / .webp / .jpg) from one of: \`${ALLOWED_HOSTS.join('`, `')}\``
              });
              core.setFailed('Invalid URL');
              return;
            }

            core.setOutput('emote_name', emoteName);
            core.setOutput('image_url', imageUrl);

      - name: Update community_emotes.json
        env:
          EMOTE_NAME: ${{ steps.parse.outputs.emote_name }}
          IMAGE_URL: ${{ steps.parse.outputs.image_url }}
        run: |
          node - << 'EOF'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('community_emotes.json', 'utf8'));
          data[process.env.EMOTE_NAME] = process.env.IMAGE_URL;
          const sorted = Object.fromEntries(Object.entries(data).sort());
          fs.writeFileSync('community_emotes.json', JSON.stringify(sorted, null, 2) + '\n');
          console.log(`Added ${process.env.EMOTE_NAME}`);
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add community_emotes.json
          git commit -m "Add emote ${{ steps.parse.outputs.emote_name }} (issue #${{ github.event.issue.number }})"
          git push

      - name: Close issue with success comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Emote \`${{ steps.parse.outputs.emote_name }}\` has been added to the community pack! It will be live for all GLYPHE users on their next cache refresh.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
